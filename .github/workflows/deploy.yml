name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to fi-vmmini
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/dreamwallet/projects/dreamwallet

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🗄️ Applying DB migrations..."
            pnpm --filter @dreamwallet/db exec prisma db push --accept-data-loss

            echo "⚙️ Generating Prisma client..."
            pnpm --filter @dreamwallet/db db:generate

            echo "💾 Disk usage:"
            df -h .

            echo "🧹 Cleaning old build..."
            rm -rf apps/worker/dist
            rm -rf apps/web/.next/cache
            mkdir -p apps/web/.next/static/dreamwallet-stable
            pnpm store prune 2>/dev/null || true

            echo "🔨 Building packages..."
            pnpm --filter @dreamwallet/db build
            pnpm --filter @dreamwallet/web build
            pnpm --filter @dreamwallet/worker build

            echo "📁 Copying static assets..."
            cp -r apps/web/public apps/web/.next/standalone/apps/web/public 2>/dev/null || true
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static 2>/dev/null || true
            touch apps/web/.next/server/pages-manifest.json 2>/dev/null || true

            echo "🚀 Restarting services..."
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save

            echo "✅ Deploy complete!"

      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dreamwallet.brewos.ru)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "❌ Health check failed!"
            exit 1
          fi
          echo "✅ Site is up!"
