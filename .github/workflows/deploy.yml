name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to fi-vmmini
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 151.241.234.248
          username: dreamwallet
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/dreamwallet/projects/dreamwallet

            echo "📦 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🗄️ Applying DB migrations..."
            pnpm --filter @dreamwallet/db exec prisma db push --accept-data-loss

            echo "⚙️ Generating Prisma client..."
            pnpm --filter @dreamwallet/db db:generate

            echo "💾 Disk usage:"
            df -h .

            echo "🧹 Cleaning old build artifacts..."
            rm -rf apps/worker/dist
            rm -rf apps/web/.next-build
            pnpm store prune 2>/dev/null || true

            echo "🔨 Building packages..."
            pnpm --filter @dreamwallet/db build
            pnpm --filter @dreamwallet/web build
            pnpm --filter @dreamwallet/worker build

            echo "📁 Copying static assets into new build..."
            cp -r apps/web/public apps/web/.next-build/standalone/apps/web/public 2>/dev/null || true
            mkdir -p apps/web/.next-build/standalone/apps/web/.next
            cp -r apps/web/.next-build/static apps/web/.next-build/standalone/apps/web/.next/static
            touch apps/web/.next-build/server/pages-manifest.json 2>/dev/null || true

            echo "✅ Validating standalone build..."
            if [ ! -f "apps/web/.next-build/standalone/apps/web/server.js" ]; then
              echo "❌ standalone/server.js not found in new build! Aborting."
              exit 1
            fi
            echo "  → server.js OK"
            if [ ! -d "apps/web/.next-build/standalone/apps/web/.next/static" ]; then
              echo "❌ .next/static not found in standalone! Aborting."
              exit 1
            fi
            echo "  → static assets OK"

            echo "🔄 Swapping build atomically..."
            rm -rf apps/web/.next.old 2>/dev/null || true
            [ -d "apps/web/.next" ] && mv apps/web/.next apps/web/.next.old
            mv apps/web/.next-build apps/web/.next
            rm -rf apps/web/.next.old &

            echo "🚀 Restarting services..."
            pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save

            echo "⏳ Waiting for app to be ready..."
            for i in $(seq 1 10); do
              sleep 3
              STATUS=$(pm2 describe dreamwallet-web 2>/dev/null | grep "status" | grep -c "online" || echo 0)
              if [ "$STATUS" -gt "0" ]; then
                echo "  → PM2 online after ${i}x3s"
                break
              fi
              if [ "$i" -eq "10" ]; then
                echo "❌ App failed to come online!"
                pm2 logs dreamwallet-web --lines 20 --nostream
                exit 1
              fi
            done

            echo "✅ Deploy complete!"

      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dreamwallet.brewos.ru)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "❌ Health check failed!"
            exit 1
          fi
          echo "✅ Site is up!"
