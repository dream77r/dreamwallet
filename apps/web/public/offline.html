<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Нет подключения — DreamWallet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5ff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.12);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #eef2ff;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .status {
      margin-top: 24px;
      padding: 12px 16px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: 13px;
      color: #9ca3af;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет подключения к интернету</h1>
    <p>
      DreamWallet работает офлайн. Ваши данные в безопасности —
      все изменения синхронизируются автоматически при восстановлении связи.
    </p>
    <button class="btn" onclick="location.reload()">
      ↻ Повторить
    </button>
    <div class="status">
      <span class="dot"></span>
      Офлайн режим • Данные актуальны из кеша
    </div>
  </div>
</body>
</html>
